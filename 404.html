<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Halaman Tidak Ditemukan</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: #08111f;
        color: #f7f9ff;
      }
      main { width: min(720px, 92vw); }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 1.2rem;
        background: rgba(255, 255, 255, 0.05);
      }
      a { color: #3bc8b4; }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.1rem 0.35rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>404 — Halaman tidak ditemukan</h1>
        <p>URL yang kamu buka tidak ada di deployment ini.</p>
        <p>
          Coba akses halaman yang tersedia:
          <a href="/">Beranda</a>,
          <a href="/tentang">Tentang</a>,
          <a href="/arsip">Arsip</a>.
        </p>
        <p>Kalau tetap gagal, cek apakah URL deployment kamu benar (domain <code>*.vercel.app</code> aktif).</p>
      </section>
    </main>
  </body>
</html>
